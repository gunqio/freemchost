name: Server Auto Renew

on:
  schedule:
    - cron: '37 6 * * *'
  workflow_dispatch:

jobs:
  renew_job:
    runs-on: ubuntu-latest

    steps:
    # 1. 关键：拉取私有仓库代码 (确保配置了 GH_PAT)
    - name: Checkout repository code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}

    # 2. 环境准备：Python 与 Xray
    - name: Set up Environment
      run: |
        python -m pip install --upgrade pip
        pip install requests
        # 下载并解压 Xray
        curl -L https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
        unzip xray.zip xray
        # 写入配置文件并后台启动
        echo '${{ secrets.VMESS_JSON }}' > config.json
        ./xray -c config.json &
        sleep 5

    # 3. 运行根目录下的脚本 (明确指定文件名为 freemchost.py)
    - name: Run renew script
      env:
        MY_EMAIL: ${{ secrets.MY_EMAIL }}
        MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
        ANON_KEY: ${{ secrets.ANON_KEY }}
        SCKEY: ${{ secrets.SCKEY }}
        https_proxy: socks5://127.0.0.1:1080
        http_proxy: socks5://127.0.0.1:1080
      run: python freemchost.py | tee renew.log

    # 4. 发送 Telegram 通知
    - name: Send Telegram Notification
      if: always()
      env:
        TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_ID: ${{ secrets.TG_USER_ID }}
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          TITLE="✅ Freemchost 自动续期成功！"
        else
          TITLE="❌ Freemchost 自动续期失败！"
        fi
        INFO_SUMMARY=$(grep -E "服务器名称|当前状态|到期时间" renew.log | sed 's/"//g')
        if [ -z "$INFO_SUMMARY" ]; then
          INFO_SUMMARY=$(tail -n 5 renew.log | sed 's/"//g')
        fi
        MSG_TEXT="${TITLE}
        
        🔗 详情: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        
        📊 服务器最新状态:
        ${INFO_SUMMARY}"
        
        curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
          -d "chat_id=${TG_ID}" \
          -d "text=${MSG_TEXT}"
