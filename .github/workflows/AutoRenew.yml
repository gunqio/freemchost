name: Server Auto Renew

on:
  schedule:
    - cron: '37 6 * * *' # 每天北京时间 14:37 自动运行
  workflow_dispatch: # 允许手动点击运行

jobs:
  renew_job:
    runs-on: ubuntu-latest

    steps:
    # 1. 下载当前仓库代码
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. 拉取私有库并提取文件
    - name: Checkout private repository
      env:
        MY_PAT: ${{ secrets.MY_PAT }}
      run: |
        # 使用 PAT 克隆私有库到临时目录
        git clone https://x-access-token:${MY_PAT}@github.com/gunqio/zhiyong.git private_repo
        # 将文件复制到当前工作目录并命名为 freemchost.py
        cp private_repo/freemchost.py freemchost.py

    # 3. 安装 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 4. 安装依赖库
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 5. 运行续期脚本
    - name: Run renew script
      env:
        MY_EMAIL: ${{ secrets.MY_EMAIL }}
        MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
        ANON_KEY: ${{ secrets.ANON_KEY }}
      run: python freemchost.py | tee renew.log

    # 6. 发送 TG 通知
    - name: Send Telegram Notification
      if: always()
      env:
        TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_ID: ${{ secrets.TG_USER_ID }}
      run: |
        # 设定大标题
        if [ "${{ job.status }}" = "success" ]; then
          TITLE="✅ Freemchost 自动续期成功！"
        else
          TITLE="❌ Freemchost 自动续期失败！"
        fi
        
        # 核心：从 renew.log 中过滤关键信息
        INFO_SUMMARY=$(grep -E "服务器名称|当前状态|到期时间" renew.log | sed 's/"//g')
        
        # 兜底：如果没抓到关键行，显示日志最后5行
        if [ -z "$INFO_SUMMARY" ]; then
          INFO_SUMMARY=$(tail -n 5 renew.log | sed 's/"//g')
        fi
        
        # 组合消息
        MSG_TEXT="${TITLE}
        
        🔗 详情: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        
        📊 服务器最新状态:
        ${INFO_SUMMARY}"
        
        # 发送请求
        curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
          -d "chat_id=${TG_ID}" \
          -d "text=${MSG_TEXT}"
