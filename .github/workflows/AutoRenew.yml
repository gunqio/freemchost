name: Server Auto Renew

on:
  schedule:
    - cron: '37 6 * * *'   # 每天北京时间 14:37 自动运行
  workflow_dispatch:       # 允许手动触发

jobs:
  renew_job:
    runs-on: ubuntu-latest

    steps:
    # 1. 显式拉取指定的私有仓库 gunqio/zhiyong
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        repository: gunqio/zhiyong          # 指定仓库地址
        token: ${{ secrets.GITHUB_TOKEN }}  # 使用内置 token 访问私有仓库

    # 2. 安装 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 安装依赖
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 4. 运行续期脚本（注意文件名已修正为 freemhost.py）
    - name: Run renew script
      env:
        MY_EMAIL: ${{ secrets.MY_EMAIL }}
        MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
        ANON_KEY: ${{ secrets.ANON_KEY }}
      run: python freemhost.py | tee freemhost.log

    # 5. 发送 Telegram 通知（从日志中提取服务器信息）
    - name: Send Telegram Notification
      if: always()
      env:
        TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_ID: ${{ secrets.TG_USER_ID }}
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          TITLE="✅ Freemhost 自动续期成功！"
        else
          TITLE="❌ Freemhost 自动续期失败！"
        fi
        
        INFO_SUMMARY=$(grep -E "服务器名称|当前状态|到期时间" freemhost.log | sed 's/"//g')
        if [ -z "$INFO_SUMMARY" ]; then
          INFO_SUMMARY=$(tail -n 5 freemhost.log | sed 's/"//g')
        fi
        
        MSG_TEXT="${TITLE}
        
        🔗 详情: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        
        📊 服务器最新状态:
        ${INFO_SUMMARY}"
        
        curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
          -d "chat_id=${TG_ID}" \
          -d "text=${MSG_TEXT}"
