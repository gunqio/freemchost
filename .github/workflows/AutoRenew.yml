name: Server Auto Renew

on:
  schedule:
    - cron: '37 6 * * *'
  workflow_dispatch:

jobs:
  renew_job:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 1. 下载私库中的 freemchost.py
    - name: 下载私有脚本
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
      run: |
        mkdir -p scripts
        curl -L -H "Authorization: token $GH_TOKEN" \
          "https://raw.githubusercontent.com/gunqio/zhiyong/main/freemchost.py" \
          -o "scripts/freemchost.py"

    # 2. 安装 Python 依赖 (通过 requests[socks] 解决 SOCKS 依赖缺失)
    - name: 安装 Python 依赖
      run: |
        pip install --upgrade pip
        pip install requests[socks]

    # 3. 启动 Xray 代理 (已移除废弃的 allowInsecure)
    - name: 启动 Xray 代理
      env:
        V2RAY_CONFIG: ${{ secrets.VMESS_JSON }}
      run: |
        curl -sL https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
        unzip -q xray.zip xray
        echo "$V2RAY_CONFIG" > config.json
        ./xray run -c config.json &
        sleep 5
        # 代理测试
        echo "代理连接测试:"
        curl -s --socks5 127.0.0.1:10808 ifconfig.me || echo "警告: 代理未成功通联，请检查 JSON 配置"

    # 4. 运行续期脚本
    - name: 运行续期脚本
      env:
        MY_EMAIL: ${{ secrets.MY_EMAIL }}
        MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
        ANON_KEY: ${{ secrets.ANON_KEY }}
        SCKEY: ${{ secrets.SCKEY }}
        https_proxy: socks5://127.0.0.1:10808
        http_proxy: socks5://127.0.0.1:10808
      run: |
        python3 scripts/freemchost.py | tee renew.log

    # 5. 发送 Telegram 通知
    - name: 发送 Telegram 通知
      if: always()
      env:
        TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_ID: ${{ secrets.TG_USER_ID }}
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          TITLE="✅ Freemchost 自动续期成功！"
        else
          TITLE="❌ Freemchost 自动续期失败！"
        fi
        INFO_SUMMARY=$(grep -E "服务器名称|当前状态|新到期时间" renew.log | sed 's/"/g' | head -n 5)
        [ -z "$INFO_SUMMARY" ] && INFO_SUMMARY="脚本运行异常，详情见 Action 日志。"
        MSG_TEXT="${TITLE}%0A%0A📊 状态摘要:%0A${INFO_SUMMARY}"
        curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
          -d "chat_id=${TG_ID}" \
          -d "text=$(echo -e $MSG_TEXT)"
